name: StellarPay CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    name: Build and Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run automated tests
      run: npm test -- --watchAll=false

  smart_contract_tests:
    name: Smart Contract Tests (Rust/Soroban)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Run Token Contract Tests
      run: |
        cd contracts/token
        cargo test

    - name: Build Token Contract (WASM)
      run: |
        cd contracts/token
        cargo build --target wasm32-unknown-unknown --release
        # Create the directory structure expected by the crowdfund contract import
        mkdir -p target/wasm32v1-none/release
        cp target/wasm32-unknown-unknown/release/token.wasm target/wasm32v1-none/release/token.wasm

    - name: Run Crowdfund Contract Tests
      run: |
        cd contracts/crowdfund
        cargo test

  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - name: Run npm audit
      run: npm audit --audit-level=high || true

  deploy_preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request'
    needs: [build_and_test, smart_contract_tests, security_scan]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Deploy to Vercel (Preview)
      uses: amondnet/vercel-action@v20
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy_production:
    name: Deploy Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build_and_test, smart_contract_tests, security_scan]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Deploy to Vercel (Production)
      uses: amondnet/vercel-action@v20
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
